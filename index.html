<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reinsurance CRM — POC</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body { margin: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

/* ------------------------------------------------------------------
   Reinsurance CRM — v1 UI prototype
   Built to PRD Rev. D: group-level entities only, prospect support,
   fast touchpoint entry, optional actions, Power BI placeholder.
   All data is in-memory sample data.
------------------------------------------------------------------- */

const css = `
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --ink: #1B2A41;
  --ink-soft: #44546B;
  --paper: #FAF9F6;
  --card: #FFFFFF;
  --line: #E4E2DA;
  --line-soft: #EFEDE6;
  --accent: #8C2F28;        /* oxblood — used sparingly */
  --accent-soft: #F6E9E7;
  --prospect: #9A6B15;
  --prospect-bg: #FBF3E2;
  --ok: #2F6B4F;
  --ok-bg: #E8F2EC;
  --mono: 'IBM Plex Mono', monospace;
  --display: 'Fraunces', serif;
  --body: 'Public Sans', system-ui, sans-serif;
}
* { box-sizing: border-box; }
.app { font-family: var(--body); color: var(--ink); background: var(--paper); min-height: 100vh; display: flex; font-size: 14px; }
.app ::selection { background: var(--accent-soft); }

/* ---- left rail ---- */
.rail { width: 216px; background: var(--ink); color: #E9ECF2; padding: 20px 14px; display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
.rail-brand { font-family: var(--display); font-size: 19px; font-weight: 600; letter-spacing: 0.2px; padding: 2px 10px 18px; color: #fff; }
.rail-brand span { color: #C9A86A; }
.rail-sec { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #8E9AAD; padding: 14px 10px 6px; }
.rail-btn { text-align: left; background: none; border: 0; color: #C9D2DF; padding: 8px 10px; border-radius: 7px; cursor: pointer; font: inherit; font-weight: 500; width: 100%; display:flex; justify-content: space-between; align-items:center; }
.rail-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
.rail-btn.on { background: rgba(255,255,255,0.12); color: #fff; }
.rail-count { font-family: var(--mono); font-size: 11px; color: #8E9AAD; }
.rail-foot { margin-top: auto; font-size: 11px; color: #74819A; padding: 10px; border-top: 1px solid rgba(255,255,255,0.08); line-height: 1.5; }

/* ---- main ---- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; gap: 14px; padding: 14px 28px; border-bottom: 1px solid var(--line); background: var(--card); position: sticky; top: 0; z-index: 5; }
.search { flex: 1; max-width: 460px; position: relative; }
.search input { width: 100%; border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font: inherit; background: var(--paper); outline: none; }
.search input:focus { border-color: var(--ink-soft); background:#fff; }
.search-pop { position:absolute; top: 40px; left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow: 0 10px 28px rgba(27,42,65,0.13); overflow:hidden; z-index: 30; }
.search-row { padding: 9px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.search-row:hover { background: var(--paper); }
.search-hint { font-size: 11px; color: var(--ink-soft); padding: 7px 12px; border-top: 1px solid var(--line-soft); background: var(--paper); }
.btn { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 7px 13px; font: inherit; font-weight: 600; cursor: pointer; color: var(--ink); }
.btn:hover { border-color: var(--ink-soft); }
.btn.primary { background: var(--ink); border-color: var(--ink); color: #fff; }
.btn.primary:hover { background: #24364F; }
.btn.sm { padding: 4px 10px; font-size: 12.5px; font-weight: 500; }
.content { padding: 26px 28px 60px; max-width: 1060px; width: 100%; }

/* ---- typography & badges ---- */
.h1 { font-family: var(--display); font-size: 26px; font-weight: 600; margin: 0; }
.eyebrow { font-size: 10.5px; letter-spacing: 0.13em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; }
.mono { font-family: var(--mono); font-size: 12px; color: var(--ink-soft); }
.badge { display:inline-flex; align-items:center; font-size: 11px; font-weight: 600; border-radius: 99px; padding: 2px 9px; letter-spacing: 0.02em; }
.badge.prospect { background: var(--prospect-bg); color: var(--prospect); border: 1px solid #E8D5A8; }
.badge.synced { background: var(--ok-bg); color: var(--ok); }
.badge.status { background: var(--line-soft); color: var(--ink-soft); }
.badge.overdue { background: var(--accent-soft); color: var(--accent); }
.chip { font-size: 11.5px; background: var(--line-soft); border-radius: 6px; padding: 2px 8px; color: var(--ink-soft); }

/* ---- cards & tables ---- */
.card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; }
.card-h { display:flex; align-items:center; justify-content:space-between; padding: 13px 18px; border-bottom: 1px solid var(--line-soft); }
.card-t { font-weight: 700; font-size: 13.5px; }
.tbl { width: 100%; border-collapse: collapse; }
.tbl th { text-align:left; font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); padding: 10px 18px; border-bottom: 1px solid var(--line-soft); font-weight: 600; }
.tbl td { padding: 11px 18px; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
.tbl tr:last-child td { border-bottom: 0; }
.tbl tr.click { cursor: pointer; }
.tbl tr.click:hover td { background: var(--paper); }
.linkish { color: var(--ink); font-weight: 600; cursor: pointer; }
.linkish:hover { text-decoration: underline; }

/* ---- profile header: the "slip" ---- */
.slip { background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--ink); border-radius: 12px; padding: 20px 22px; }
.slip.prospect { border-left-color: var(--prospect); }
.slip-grid { display:grid; grid-template-columns: repeat(4, minmax(120px,1fr)); gap: 14px 22px; margin-top: 16px; }
.slip-k { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); font-weight:600; margin-bottom: 3px; }
.slip-v { font-weight: 600; font-size: 13.5px; }

/* ---- touchpoint feed ---- */
.tp { display: flex; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--line-soft); }
.tp:last-child { border-bottom: 0; }
.tp-rail { width: 3px; border-radius: 2px; background: var(--line); flex-shrink: 0; }
.tp-rail.renewal { background: var(--accent); }
.tp-rail.exec { background: #C9A86A; }
.tp-type { font-family: var(--mono); font-size: 11px; color: var(--ink-soft); }
.tp-sub { font-weight: 600; margin: 2px 0 4px; }
.tp-body { color: var(--ink-soft); line-height: 1.5; }
.tp-meta { display:flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.star { border:0; background:none; cursor:pointer; font-size:17px; line-height:1; color:#C8C4B8; padding:2px 4px; flex-shrink:0; }
.star.on { color:#C9A86A; }
.star:hover { color:#C9A86A; }
.feed-filter { display:flex; gap:6px; align-items:center; }
.feed-filter button { border:1px solid var(--line); background:#fff; border-radius:99px; padding:4px 11px; font:inherit; font-size:12px; cursor:pointer; color:var(--ink-soft); }
.feed-filter button.on { background:var(--ink); border-color:var(--ink); color:#fff; }

/* ---- tabs ---- */
.tabs { display:flex; gap: 2px; border-bottom: 1px solid var(--line); margin: 22px 0 18px; }
.tab { border: 0; background: none; font: inherit; font-weight: 600; color: var(--ink-soft); padding: 9px 14px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.on { color: var(--ink); border-bottom-color: var(--accent); }

/* ---- modal / form ---- */
.scrim { position: fixed; inset: 0; background: rgba(27,42,65,0.45); display:flex; align-items:flex-start; justify-content:center; padding: 7vh 16px; z-index: 50; }
.modal { background: #fff; border-radius: 14px; width: 600px; max-width: 100%; max-height: 86vh; overflow:auto; box-shadow: 0 24px 60px rgba(27,42,65,0.3); }
.modal-h { padding: 18px 22px 0; }
.modal-b { padding: 16px 22px 22px; display:flex; flex-direction:column; gap: 14px; }
.f-row { display:flex; gap: 12px; }
.f { flex:1; display:flex; flex-direction:column; gap: 5px; }
.f label { font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink-soft); font-weight: 700; }
.f label .opt { color: #A6ADB9; font-weight: 500; text-transform: none; letter-spacing: 0; }
.f input, .f select, .f textarea { border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font: inherit; outline: none; background: #fff; }
.f input:focus, .f select:focus, .f textarea:focus { border-color: var(--ink-soft); }
.seg { display:flex; flex-wrap:wrap; gap: 6px; }
.seg button { border:1px solid var(--line); background:#fff; border-radius: 99px; padding: 5px 12px; font: inherit; font-size: 12.5px; cursor:pointer; color: var(--ink-soft); }
.seg button.on { background: var(--ink); border-color: var(--ink); color:#fff; }
.note-banner { background: var(--paper); border: 1px dashed var(--line); border-radius: 8px; padding: 9px 12px; font-size: 12px; color: var(--ink-soft); }

/* ---- @typeahead ---- */
.ta { position: relative; }
.ta-selected { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:6px; }
.ta-chip { display:inline-flex; align-items:center; gap:6px; background: var(--ink); color:#fff; border-radius:99px; padding:4px 6px 4px 11px; font-size:12.5px; font-weight:600; }
.ta-chip button { border:0; background:rgba(255,255,255,0.18); color:#fff; border-radius:99px; width:17px; height:17px; line-height:15px; cursor:pointer; font-size:12px; padding:0; }
.ta-pop { position:absolute; top:calc(100% + 4px); left:0; right:0; background:#fff; border:1px solid var(--line); border-radius:10px; box-shadow:0 10px 28px rgba(27,42,65,0.13); overflow:hidden; z-index:40; }
.ta-row { padding:8px 12px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
.ta-row:hover, .ta-row.hl { background: var(--paper); }
.ta-row .mono { font-size:11px; }

/* ---- PBI placeholder ---- */
.pbi { border: 1px dashed var(--line); border-radius: 12px; background: repeating-linear-gradient(45deg, #fff, #fff 12px, #FBFAF7 12px, #FBFAF7 24px); padding: 34px; text-align: center; color: var(--ink-soft); }
.pbi b { color: var(--ink); }
.pbi .mono { display:block; margin-top: 8px; }

.empty { padding: 26px 18px; text-align:center; color: var(--ink-soft); font-size: 13px; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding: 10px 18px; border-radius: 10px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 60; }
@media (max-width: 860px){ .rail{display:none;} .slip-grid{grid-template-columns:repeat(2,1fr);} }
`;

/* ---------------- sample data (fictional) ---------------- */

const seedGroups = [
  { key: "CG-104", origin: "Synced", type: "client", system: "ALPINE NATL INS GRP CONSOLIDATED", display: "Alpine National", aliases: ["ANIG", "Alpine"], region: "North America", segment: "Global", lead: "S. Verma", relStatus: "Active", brokers: ["BG-021", "BG-007"] },
  { key: "CG-219", origin: "Synced", type: "client", system: "MERIDIAN MUTUAL HOLDINGS GROUP", display: "Meridian Mutual", aliases: ["MMH"], region: "Continental Europe", segment: "Large National", lead: "J. Okafor", relStatus: "Active", brokers: ["BG-021"] },

const ME = "S. Verma";
/* Internal user directory — synced nightly from Entra ID / Active Directory,
   filtered to client-facing groups. Also powers Client Lead and Action Owner pickers.
   Typeahead matches last name, first name, or initials. */
const DIRECTORY = [
  { name: "S. Verma",   label: "Verma, Sunita" },
  { name: "K. Brandt",  label: "Brandt, Klaus" },
  { name: "J. Okafor",  label: "Okafor, Jide" },
  { name: "M. Chen",    label: "Chen, Mei" },
  { name: "A. Fontaine",label: "Fontaine, Amélie" },
  { name: "R. Tanaka",  label: "Tanaka, Ryo" },
  { name: "L. Petrov",  label: "Petrov, Lena" },
  { name: "D. Whitfield",label: "Whitfield, Daniel" },
];

/* ---------------- helpers ---------------- */
const fmt = (d) => d ? new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" }) : "No due date";
const today = "2026-06-09";

function App() {
  const [groups, setGroups] = useState(seedGroups);
  const [contacts, setContacts] = useState(seedContacts);
  const [tps, setTps] = useState(seedTouchpoints);
  const [actions, setActions] = useState(seedActions);
  const [notes, setNotes] = useState(seedNotes);

  const [view, setView] = useState({ page: "home", key: null });
  const [q, setQ] = useState("");
  const [showTpForm, setShowTpForm] = useState(false);
  const [toast, setToast] = useState(null);

  const g = (key) => groups.find((x) => x.key === key);
  const ping = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); };

  const hits = useMemo(() => {
    if (!q.trim()) return [];
    const s = q.toLowerCase();
    return groups.filter((x) =>
      x.display.toLowerCase().includes(s) ||
      x.system.toLowerCase().includes(s) ||
      x.aliases.some((a) => a.toLowerCase().includes(s))
    ).slice(0, 6);
  }, [q, groups]);

  const openProfile = (key) => { setView({ page: "profile", key }); setQ(""); };

  const myOpen = actions.filter((a) => a.owner === ME && a.status === "Open").length;

  return (
    <div className="app">
      <style>{css}</style>

      {/* ------- left rail ------- */}
      <nav className="rail">
        <div className="rail-brand">Cedar<span>·</span>Re CRM</div>
        <div className="rail-sec">Relationships</div>
        <button className={`rail-btn ${view.page === "home" ? "on" : ""}`} onClick={() => setView({ page: "home" })}>
          Clients &amp; brokers <span className="rail-count">{groups.length}</span>
        </button>
        <div className="rail-sec">Workspace</div>
        <button className={`rail-btn ${view.page === "actions" ? "on" : ""}`} onClick={() => setView({ page: "actions" })}>
          My actions <span className="rail-count">{myOpen}</span>
        </button>
        <button className="rail-btn" onClick={() => ping("Opens the upcoming-renewals Power BI report")}>
          Renewals ↗
        </button>
        <div className="rail-sec">Admin</div>
        <button className={`rail-btn ${view.page === "admin" ? "on" : ""}`} onClick={() => setView({ page: "admin" })}>
          Group mapping
        </button>
        <div className="rail-foot">Reference data synced nightly from the data warehouse · last sync 02:10 UTC</div>
      </nav>

      {/* ------- main ------- */}
      <div className="main">
        <div className="topbar">
          <div className="search">
            <input
              placeholder="Search clients & brokers — try “GC”, “Alpine”, or a system name…"
              value={q}
              onChange={(e) => setQ(e.target.value)}
            />
            {hits.length > 0 && (
              <div className="search-pop">
                {hits.map((x) => (
                  <div key={x.key} className="search-row" onClick={() => openProfile(x.key)}>
                    <span style={{ fontWeight: 600 }}>{x.display}</span>
                    <span className="mono">{x.key}</span>
                    <span className="chip">{x.type}</span>
                    {x.origin === "Prospect" && <span className="badge prospect">Prospect</span>}
                  </div>
                ))}
                <div className="search-hint">Matches display names, aliases and warehouse system names — clients and brokers</div>
              </div>
            )}
          </div>
        </div>

        <div className="content">
          {view.page === "home" && <Home groups={groups} actions={actions} tps={tps} g={g} onOpen={openProfile} />}
          {view.page === "profile" && <Profile gk={view.key} g={g} contacts={contacts} tps={tps} actions={actions} notes={notes}
            onOpen={openProfile} onLogTp={() => setShowTpForm(true)}
            onAddNote={(b) => { setNotes([{ id: Date.now(), on: view.key, body: b, author: ME, date: today }, ...notes]); ping("Note added"); }}
            onAddContact={(c) => { setContacts([...contacts, { ...c, id: Date.now(), org: view.key, status: "Active" }]); ping("Contact added"); }}
            onToggleKey={(id) => setTps(tps.map((t) => t.id === id ? { ...t, key: !t.key } : t))}
            onCompleteAction={(id) => { setActions(actions.map((a) => a.id === id ? { ...a, status: "Done" } : a)); ping("Action completed"); }} />}
          {view.page === "actions" && <MyActions actions={actions} g={g} onOpen={openProfile}
            onComplete={(id) => { setActions(actions.map((a) => a.id === id ? { ...a, status: "Done" } : a)); ping("Action completed"); }} />}
          {view.page === "admin" && <Admin groups={groups} onConvert={() => ping("Conversion flow: pick the incoming synced group → records re-point")}
            onRename={(key, name) => { setGroups(groups.map((x) => x.key === key ? { ...x, display: name } : x)); ping("Display name updated"); }} />}
        </div>
      </div>

      {showTpForm && (
        <TouchpointForm
          groups={groups} contacts={contacts}
          defaultClient={view.page === "profile" && g(view.key)?.type === "client" ? view.key : ""}
          defaultBroker={view.page === "profile" && g(view.key)?.type === "broker" ? view.key : ""}
          onClose={() => setShowTpForm(false)}
          onSave={(tp, action) => {
            const id = Date.now();
            setTps([{ ...tp, id, author: ME }, ...tps]);
            if (action) setActions((a) => [{ ...action, id: id + 1, status: "Open", client: tp.client, tp: id }, ...a]);
            setShowTpForm(false);
            ping(action ? "Touchpoint + follow-up saved" : "Touchpoint saved");
          }}
        />
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

/* ---------------- @typeahead for internal people ----------------
   Matches last name, first name, or initials. Keyboard: ↑↓ + Enter.
   `single` mode = exactly one person (used for action Owner).
   Same component pattern is reusable for @entity mentions in notes. */
function InternalTypeahead({ selected, onChange, single = false, placeholder }) {
  const [q, setQ] = useState("");
  const [hl, setHl] = useState(0);
  const term = q.replace(/^@/, "").trim().toLowerCase();
  const matches = term
    ? DIRECTORY.filter((u) => !selected.includes(u.name)).filter((u) => {
        const [last, first] = u.label.toLowerCase().split(", ");
        const initials = (first[0] + last[0]);
        return last.startsWith(term) || first.startsWith(term) ||
               u.label.toLowerCase().includes(term) || initials.startsWith(term.replace(/\W/g, ""));
      }).slice(0, 5)
    : [];

  const pick = (u) => { onChange(single ? [u.name] : [...selected, u.name]); setQ(""); setHl(0); };
  const showInput = !single || selected.length === 0;

  return (
    <div className="ta">
      <div className="ta-selected">
        {selected.map((name) => {
          const u = DIRECTORY.find((d) => d.name === name);
          return (
            <span className="ta-chip" key={name}>
              {u ? u.label : name}{name === ME ? " (you)" : ""}
              <button onClick={() => onChange(selected.filter((n) => n !== name))} aria-label={`Remove ${name}`}>×</button>
            </span>
          );
        })}
      </div>
      {showInput && (
        <input
          placeholder={placeholder || "@bra → Brandt, Klaus…"}
          value={q}
          onChange={(e) => { setQ(e.target.value); setHl(0); }}
          onKeyDown={(e) => {
            if (e.key === "ArrowDown") { e.preventDefault(); setHl(Math.min(hl + 1, matches.length - 1)); }
            if (e.key === "ArrowUp") { e.preventDefault(); setHl(Math.max(hl - 1, 0)); }
            if (e.key === "Enter" && matches[hl]) { e.preventDefault(); pick(matches[hl]); }
            if (e.key === "Backspace" && !q && selected.length) onChange(selected.slice(0, -1));
          }}
          style={{ width: "100%", border: "1px solid var(--line)", borderRadius: 8, padding: "8px 10px", font: "inherit", outline: "none" }}
        />
      )}
      {showInput && matches.length > 0 && (
        <div className="ta-pop">
          {matches.map((u, i) => (
            <div key={u.name} className={`ta-row ${i === hl ? "hl" : ""}`}
              onMouseEnter={() => setHl(i)} onClick={() => pick(u)}>
              <span style={{ fontWeight: 600 }}>{u.label}</span>
              <span className="mono">↵ to {single ? "assign" : "add"}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ---------------- the <60s touchpoint form ---------------- */
function TouchpointForm({ groups, contacts, defaultClient, defaultBroker, onClose, onSave }) {
  const [type, setType] = useState("Meeting");
  const [date, setDate] = useState(today);
  const [client, setClient] = useState(defaultClient || "");
  const [broker, setBroker] = useState(defaultBroker || "");
  const [subject, setSubject] = useState("");
  const [summary, setSummary] = useState("");
  const [lob, setLob] = useState([]);
  const [topics, setTopics] = useState([]);
  const [ext, setExt] = useState([]);
  const [internal, setInternal] = useState([ME]); // author pre-selected — zero clicks for the common case
  const [withFollowUp, setWithFollowUp] = useState(false);
  const [isKey, setIsKey] = useState(false);
  const [fuDesc, setFuDesc] = useState("");
  const [fuDue, setFuDue] = useState("");
  const [fuOwner, setFuOwner] = useState(ME);          // defaults to author — zero clicks
  const [fuPriority, setFuPriority] = useState("Medium"); // defaults silently to Medium

  const clients = groups.filter((x) => x.type === "client");
  const brokers = groups.filter((x) => x.type === "broker");
  const clientContacts = contacts.filter((c) => c.org === client || c.org === broker);
  const valid = subject.trim() && (client || broker);

  const toggle = (arr, set, v) => set(arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);

  return (
    <div className="scrim" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal">
        <div className="modal-h">
          <div className="eyebrow">New touchpoint</div>
          <h2 className="h1" style={{ fontSize: 21 }}>Log it before the next meeting starts</h2>
        </div>
        <div className="modal-b">
          <div className="f"><label>Type</label>
            <div className="seg">{TP_TYPES.map((t) => <button key={t} className={type === t ? "on" : ""} onClick={() => setType(t)}>{t}</button>)}</div>
          </div>
          <div className="f-row">
            <div className="f"><label>Client group <span className="opt">{defaultBroker ? "optional for broker-only touchpoints" : ""}</span></label>
              <select value={client} onChange={(e) => setClient(e.target.value)}>
                <option value="">{defaultBroker ? "— none (broker market touchpoint) —" : "— select —"}</option>
                {clients.map((c) => <option key={c.key} value={c.key}>{c.display}{c.origin === "Prospect" ? "  (prospect)" : ""}</option>)}
              </select>
            </div>
            <div className="f"><label>Broker group <span className="opt">{defaultBroker ? "" : "optional"}</span></label>
              <select value={broker} onChange={(e) => setBroker(e.target.value)}>
                <option value="">—</option>
                {brokers.map((b) => <option key={b.key} value={b.key}>{b.display}</option>)}
              </select>
            </div>
            <div className="f" style={{ maxWidth: 150 }}><label>Date</label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
            </div>
          </div>
          <div className="f"><label>Subject</label>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <input style={{ flex: 1 }} placeholder="e.g. 1/1 renewal positioning" value={subject} onChange={(e) => setSubject(e.target.value)} />
              <button className={`star ${isKey ? "on" : ""}`} title="Mark as key touchpoint (optional — can also be starred later by anyone)"
                onClick={() => setIsKey(!isKey)} style={{ fontSize: 21 }}>★</button>
            </div>
          </div>
          <div className="f"><label>Summary <span className="opt">optional</span></label>
            <textarea rows={3} placeholder="What was discussed, what was agreed…" value={summary} onChange={(e) => setSummary(e.target.value)} />
          </div>
          {clientContacts.length > 0 && (
            <div className="f"><label>External attendees <span className="opt">decision makers shown first · optional</span></label>
              <ExternalAttendeePicker contacts={clientContacts} selected={ext} onToggle={(id) => toggle(ext, setExt, id)} />
            </div>
          )}
          <div className="f"><label>Internal attendees <span className="opt">type @ then a few letters — last name, first name, or initials</span></label>
            <InternalTypeahead selected={internal} onChange={setInternal} />
          </div>
          <div className="f-row">
            <div className="f"><label>Line of business <span className="opt">optional</span></label>
              <div className="seg">{LOBS.slice(0, 5).map((l) => <button key={l} className={lob.includes(l) ? "on" : ""} onClick={() => toggle(lob, setLob, l)}>{l}</button>)}</div>
            </div>
          </div>
          <div className="f"><label>Topic tags <span className="opt">optional</span></label>
            <div className="seg">{TOPICS.slice(0, 6).map((t) => <button key={t} className={topics.includes(t) ? "on" : ""} onClick={() => toggle(topics, setTopics, t)}>#{t}</button>)}</div>
          </div>

          <div className="note-banner">
            Follow-up is <b>optional</b> — save without one any time.{" "}
            <button className="btn sm" style={{ marginLeft: 6 }} onClick={() => setWithFollowUp(!withFollowUp)}>
              {withFollowUp ? "Remove follow-up" : "+ Add a follow-up"}
            </button>
          </div>
          {withFollowUp && (
            <>
              <div className="f-row">
                <div className="f" style={{ flex: 2 }}><label>Next step</label>
                  <input placeholder="One sentence is enough" value={fuDesc} onChange={(e) => setFuDesc(e.target.value)} />
                </div>
                <div className="f" style={{ maxWidth: 150 }}><label>Due <span className="opt">optional</span></label>
                  <input type="date" value={fuDue} onChange={(e) => setFuDue(e.target.value)} />
                </div>
              </div>
              <div className="f-row">
                <div className="f"><label>Owner <span className="opt">defaults to you — remove the chip and type @ to reassign</span></label>
                  <InternalTypeahead
                    single
                    selected={fuOwner ? [fuOwner] : []}
                    onChange={(arr) => setFuOwner(arr[0] || "")}
                    placeholder="@oka → Okafor, Jide…"
                  />
                </div>
                <div className="f" style={{ maxWidth: 170 }}><label>Priority</label>
                  <select value={fuPriority} onChange={(e) => setFuPriority(e.target.value)}>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                  </select>
                </div>
              </div>
            </>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 4 }}>
            <button className="btn" onClick={onClose}>Cancel</button>
            <button className="btn primary" disabled={!valid} style={!valid ? { opacity: 0.45, cursor: "not-allowed" } : {}}
              onClick={() => valid && onSave(
                { type, date, key: isKey, client: client || null, broker: broker || null, lob, progRef: "", subject, summary, external: ext, internal: internal.length ? internal : [ME], topics, regions: [] },
                withFollowUp && fuDesc.trim() ? { desc: fuDesc.trim(), owner: fuOwner || ME, due: fuDue || null, priority: fuPriority } : null
              )}>
              Save touchpoint
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
